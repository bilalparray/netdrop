name: netdrop
description: Cross-platform LAN file sharing — a netdrop-style peer-to-peer transfer app.
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+5

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  refena: ^3.2.2
  refena_flutter: ^3.2.1
  routerino: ^0.8.1
  shared_preferences: ^2.5.5
  file_picker: ^11.0.2
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  uuid: ^4.5.3
  http: ^1.6.0
  logging: ^1.3.0
  basic_utils: ^5.8.2
  crypto: ^3.0.7
  downloadsfolder: ^1.2.0
  open_filex: ^4.7.0
  google_fonts: ^6.2.1
  device_info_plus: ^11.3.3
  url_launcher: ^6.3.1
  path: ^1.9.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/netdrop_brand.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/netdrop_brand.png
  web:
    generate: true
    image_path: assets/images/netdrop_brand.png
    background_color: "#FFFFFF"
  windows:
    generate: true
    image_path: assets/images/netdrop_brand.png

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/netdrop_brand.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#FFFFFF"
    image: assets/images/netdrop_brand.png
